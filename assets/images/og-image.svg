<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Renegade Immortal Cultivation Simulator">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1a2350"/>
      <stop offset="55%" stop-color="#0b0e26"/>
      <stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#ffd777"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#dbe7ff" opacity="0.7">
    <circle cx="120" cy="90" r="2.5"/><circle cx="300" cy="150" r="1.8"/><circle cx="1050" cy="110" r="2.6"/>
    <circle cx="900" cy="500" r="2"/><circle cx="200" cy="520" r="2.2"/><circle cx="1120" cy="420" r="1.8"/>
  </g>

  <!-- dao circle on right -->
  <g transform="translate(940,315)" filter="url(#glow)" fill="none" stroke-linecap="round">
    <circle r="150" stroke="url(#gold)" stroke-width="6" stroke-dasharray="440 110" opacity="0.9"/>
    <circle r="116" stroke="#67e8f9" stroke-width="4" stroke-dasharray="260 110" opacity="0.75"/>
    <circle r="84" stroke="#a78bfa" stroke-width="3" stroke-dasharray="8 14" opacity="0.7"/>
    <text x="0" y="2" text-anchor="middle" dominant-baseline="central"
          font-family="'Noto Serif SC','Songti SC',serif" font-size="150" font-weight="900" fill="url(#gold)">道</text>
  </g>

  <!-- text -->
  <text x="90" y="250" font-family="'Cinzel',serif" font-size="82" font-weight="900" fill="url(#gold)" filter="url(#glow)">Renegade Immortal</text>
  <text x="94" y="315" font-family="'Noto Serif SC',serif" font-size="34" letter-spacing="16" fill="#67e8f9">仙 逆 · CULTIVATION</text>
  <text x="94" y="392" font-family="'Rajdhani',sans-serif" font-size="34" fill="#9fb0d6">Cultivation Simulator — tarik takdir Dao-mu.</text>
</svg>
