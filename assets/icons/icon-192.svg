<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="192" height="192" role="img" aria-label="Renegade Immortal Cultivation">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1a2350"/>
      <stop offset="55%" stop-color="#0b0e26"/>
      <stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2c8"/>
      <stop offset="50%" stop-color="#ffd777"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <circle cx="256" cy="256" r="168" stroke="url(#gold)" stroke-width="6" stroke-dasharray="500 120" opacity="0.9"/>
    <circle cx="256" cy="256" r="132" stroke="#67e8f9" stroke-width="4" stroke-dasharray="300 120" opacity="0.75"/>
    <circle cx="256" cy="256" r="96" stroke="#a78bfa" stroke-width="3" stroke-dasharray="8 14" opacity="0.7"/>
  </g>
  <text x="256" y="258" text-anchor="middle" dominant-baseline="central"
        font-family="'Noto Serif SC','Songti SC',serif" font-size="180" font-weight="900"
        fill="url(#gold)" filter="url(#glow)">道</text>
</svg>
